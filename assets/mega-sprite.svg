<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Mega: a cute robot with a brain visible through a glass dome head -->

  <!-- Shadow -->
  <ellipse cx="64" cy="122" rx="28" ry="5" fill="#1a1a2e" opacity="0.2"/>

  <!-- Body -->
  <rect x="40" y="72" width="48" height="38" rx="8" fill="#2d3748"/>
  <rect x="44" y="76" width="40" height="30" rx="5" fill="#4a5568"/>

  <!-- Chest screen / energy core -->
  <rect x="52" y="82" width="24" height="16" rx="3" fill="#1a202c"/>
  <rect x="54" y="84" width="20" height="12" rx="2" fill="#1976d2" opacity="0.8"/>
  <!-- Heartbeat line on screen -->
  <polyline points="56,90 60,90 62,86 64,94 66,88 68,90 72,90"
            fill="none" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arms -->
  <rect x="28" y="78" width="12" height="6" rx="3" fill="#2d3748"/>
  <circle cx="27" cy="81" r="4" fill="#4a5568"/>
  <rect x="88" y="78" width="12" height="6" rx="3" fill="#2d3748"/>
  <circle cx="101" cy="81" r="4" fill="#4a5568"/>

  <!-- Right arm waving -->
  <rect x="96" y="68" width="6" height="14" rx="3" fill="#2d3748" transform="rotate(20, 99, 78)"/>
  <circle cx="99" cy="65" r="5" fill="#4a5568"/>
  <!-- Sparkle near waving hand -->
  <g fill="#ffd54f">
    <circle cx="108" cy="58" r="1.5"/>
    <line x1="108" y1="53" x2="108" y2="55" stroke="#ffd54f" stroke-width="1.2"/>
    <line x1="108" y1="61" x2="108" y2="63" stroke="#ffd54f" stroke-width="1.2"/>
    <line x1="103" y1="58" x2="105" y2="58" stroke="#ffd54f" stroke-width="1.2"/>
    <line x1="111" y1="58" x2="113" y2="58" stroke="#ffd54f" stroke-width="1.2"/>
  </g>

  <!-- Legs -->
  <rect x="48" y="108" width="10" height="12" rx="3" fill="#2d3748"/>
  <rect x="70" y="108" width="10" height="12" rx="3" fill="#2d3748"/>
  <rect x="46" y="117" width="14" height="5" rx="2.5" fill="#4a5568"/>
  <rect x="68" y="117" width="14" height="5" rx="2.5" fill="#4a5568"/>

  <!-- Neck -->
  <rect x="56" y="66" width="16" height="8" rx="2" fill="#2d3748"/>

  <!-- Head - glass dome -->
  <ellipse cx="64" cy="44" rx="30" ry="28" fill="#1976d2" opacity="0.15"/>
  <ellipse cx="64" cy="44" rx="28" ry="26" fill="#e3f2fd" opacity="0.3"/>

  <!-- Head base / jaw -->
  <rect x="38" y="52" width="52" height="16" rx="8" fill="#2d3748"/>

  <!-- Brain visible through dome -->
  <g transform="translate(64, 38)">
    <!-- Brain shape -->
    <path d="M-12,0 C-12,-10 -8,-16 -2,-16 C0,-18 4,-18 6,-16 C12,-16 14,-10 14,-2 C16,2 14,8 10,10 C8,12 4,12 2,10 C0,12 -4,12 -6,10 C-10,8 -14,4 -12,0Z"
          fill="#f48fb1" opacity="0.85"/>
    <!-- Brain folds -->
    <path d="M-6,-12 C-4,-6 2,-8 4,-14" fill="none" stroke="#ec407a" stroke-width="1" opacity="0.6"/>
    <path d="M-8,-4 C-4,0 2,-2 6,-6" fill="none" stroke="#ec407a" stroke-width="1" opacity="0.6"/>
    <path d="M-6,4 C-2,6 4,4 8,2" fill="none" stroke="#ec407a" stroke-width="1" opacity="0.6"/>
    <!-- Tiny electric sparks on brain -->
    <circle cx="-4" cy="-8" r="1" fill="#fff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="-4" r="1" fill="#fff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="4" r="1" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Dome highlight / glass reflection -->
  <ellipse cx="52" cy="32" rx="8" ry="12" fill="white" opacity="0.15" transform="rotate(-20, 52, 32)"/>

  <!-- Eyes -->
  <circle cx="52" cy="56" r="5" fill="#1a202c"/>
  <circle cx="76" cy="56" r="5" fill="#1a202c"/>
  <circle cx="52" cy="56" r="3.5" fill="#90caf9"/>
  <circle cx="76" cy="56" r="3.5" fill="#90caf9"/>
  <!-- Eye highlights -->
  <circle cx="53.5" cy="54.5" r="1.2" fill="white"/>
  <circle cx="77.5" cy="54.5" r="1.2" fill="white"/>

  <!-- Happy mouth -->
  <path d="M56,62 Q64,68 72,62" fill="none" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>

  <!-- Antenna -->
  <line x1="64" y1="18" x2="64" y2="10" stroke="#2d3748" stroke-width="2.5"/>
  <circle cx="64" cy="8" r="3.5" fill="#1976d2"/>
  <circle cx="64" cy="8" r="2" fill="#90caf9">
    <animate attributeName="r" values="2;2.8;2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
